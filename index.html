<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agave – Gestionale Magazzino</title>
  <meta name="description" content="Software gestionale magazzino professionale: carico, scarico, giacenze, movimenti, report e importazione CSV." />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" type="image/png" href="favicon.png" />
</head>
<body class="dark">

<!-- LOGIN SCREEN -->
<div id="login-screen" class="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="14" fill="url(#lg1)"/><path d="M24 12C24 12 16 18 16 26C16 30.418 19.582 34 24 34C28.418 34 32 30.418 32 26C32 18 24 12 24 12Z" stroke="#fff" stroke-width="2.5" fill="rgba(255,255,255,0.2)"/><path d="M24 34V20M24 28L19 23M24 24L28 20" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/><defs><linearGradient id="lg1" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse"><stop stop-color="#10b981"/><stop offset="1" stop-color="#047857"/></linearGradient></defs></svg>
      <span>Agave</span>
    </div>
    <h1>Accedi al Gestionale</h1>
    <p class="login-sub">Inserisci le tue credenziali per continuare</p>
    <div class="form-group">
      <label>Utente</label>
      <input type="text" id="login-user" placeholder="admin" autocomplete="username" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <div id="login-error" class="login-error hidden">Credenziali non valide</div>
    <button class="btn btn-primary btn-full" onclick="App.login()">Accedi</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" class="app hidden">

  <!-- SIDEBAR -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <svg width="32" height="32" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="14" fill="url(#lg2)"/><path d="M24 12C24 12 16 18 16 26C16 30.418 19.582 34 24 34C28.418 34 32 30.418 32 26C32 18 24 12 24 12Z" stroke="#fff" stroke-width="2.5" fill="rgba(255,255,255,0.2)"/><path d="M24 34V20M24 28L19 23M24 24L28 20" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/><defs><linearGradient id="lg2" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse"><stop stop-color="#10b981"/><stop offset="1" stop-color="#047857"/></linearGradient></defs></svg>
        <span>Agave</span>
      </div>
      <button id="sidebar-toggle" class="sidebar-toggle" onclick="App.toggleSidebar()">&#9776;</button>
    </div>
    <nav class="sidebar-nav">
      <a href="#" class="nav-item active" data-section="dashboard" onclick="App.navigate('dashboard',this)">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Dashboard</span>
      </a>
      <a href="#" class="nav-item" data-section="products" onclick="App.navigate('products',this)">
        <svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
        <span>Prodotti</span>
      </a>
      <a href="#" class="nav-item" data-section="inbound" onclick="App.navigate('inbound',this)">
        <svg viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
        <span>Entrata Merci</span>
      </a>
      <a href="#" class="nav-item" data-section="outbound" onclick="App.navigate('outbound',this)">
        <svg viewBox="0 0 24 24"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>
        <span>Uscita Merci</span>
      </a>
      <a href="#" class="nav-item" data-section="movements" onclick="App.navigate('movements',this)">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        <span>Movimenti</span>
      </a>
      <a href="#" class="nav-item" data-section="csv" onclick="App.navigate('csv',this)">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <span>Importa CSV</span>
      </a>
      <a href="#" class="nav-item" data-section="reports" onclick="App.navigate('reports',this)">
        <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <span>Report</span>
      </a>
      <a href="#" class="nav-item" data-section="settings" onclick="App.navigate('settings',this)">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span>Impostazioni</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="user-avatar">A</div>
        <div>
          <div class="user-name" id="user-name-display">Admin</div>
          <div class="user-role" id="user-role-display">Amministratore</div>
        </div>
      </div>
      <button class="btn-logout" onclick="App.logout()" title="Esci">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <div id="topbar" class="topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn" onclick="App.toggleSidebar()">&#9776;</button>
        <h2 id="page-title">Dashboard</h2>
      </div>
      <div class="topbar-center">
        <div class="search-bar">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="global-search" placeholder="Cerca prodotto..." oninput="App.globalSearch(this.value)" />
        </div>
        <!-- SEARCH RESULTS -->
        <div id="search-results" class="search-results hidden"></div>
      </div>
      <div class="topbar-right">
        <button class="theme-toggle" onclick="App.toggleTheme()" title="Cambia tema">
          <svg id="theme-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </div>
    </div>

    <!-- NOTIFICATIONS PANEL -->
    <div id="notif-panel" class="notif-panel hidden"></div>

    <!-- MOBILE SIDEBAR OVERLAY -->
    <div id="sidebar-overlay" class="sidebar-overlay" onclick="App.toggleSidebar()"></div>

    <!-- SECTIONS -->
    <div id="section-dashboard" class="section active"></div>
    <div id="section-products" class="section"></div>
    <div id="section-inbound" class="section"></div>
    <div id="section-outbound" class="section"></div>
    <div id="section-movements" class="section"></div>
    <div id="section-csv" class="section"></div>
    <div id="section-reports" class="section"></div>
    <div id="section-settings" class="section"></div>
  </main>
</div>

<!-- MODAL -->
<div id="modal-overlay" class="modal-overlay hidden" onclick="App.closeModal()">
  <div id="modal-box" class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="modal-title">Titolo</h3>
      <button class="modal-close" onclick="App.closeModal()">&times;</button>
    </div>
    <div id="modal-body" class="modal-body"></div>
    <div id="modal-footer" class="modal-footer"></div>
  </div>
</div>



<!-- TOAST -->
<div id="toast-container" class="toast-container"></div>

<script src="js/db.js?v=20260614_1"></script>
<script src="js/charts.js?v=20260614_1"></script>
<script src="js/app.js?v=20260614_1"></script>
<script src="js/sections.js?v=20260614_1"></script>
<script src="js/sections2.js?v=20260614_1"></script>
<script src="js/sections3.js?v=20260614_1"></script>
</body>
</html>
